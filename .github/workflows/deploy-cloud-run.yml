name: Deploy to Cloud Run

on:
  workflow_dispatch:
    inputs:
      region:
        description: GCP region for Artifact Registry and Cloud Run
        required: false
        default: asia-south1
      artifact_registry_repo:
        description: Artifact Registry repository name
        required: false
        default: kshana
      cloud_run_service:
        description: Cloud Run service name
        required: false
        default: kshana-ink
      request_timeout_seconds:
        description: Cloud Run request timeout in seconds (WebSocket max 3600)
        required: false
        default: "3600"
      max_instances:
        description: Cloud Run max instances (set 1 to keep in-memory WS sessions sticky)
        required: false
        default: "1"
  push:
    branches:
      - master
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      REGION: ${{ github.event.inputs.region || 'asia-south1' }}
      ARTIFACT_REGISTRY_REPO: ${{ github.event.inputs.artifact_registry_repo || 'kshana' }}
      CLOUD_RUN_SERVICE: ${{ github.event.inputs.cloud_run_service || 'kshana-ink' }}
      REQUEST_TIMEOUT_SECONDS: ${{ github.event.inputs.request_timeout_seconds || '3600' }}
      MAX_INSTANCES: ${{ github.event.inputs.max_instances || '1' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Resolve deployment target
        run: |
          EFFECTIVE_CLOUD_RUN_SERVICE="${CLOUD_RUN_SERVICE}"
          DEPLOY_ENVIRONMENT="production"

          if [ "${GITHUB_REF_NAME}" = "dev" ]; then
            EFFECTIVE_CLOUD_RUN_SERVICE="${CLOUD_RUN_SERVICE}-dev"
            DEPLOY_ENVIRONMENT="staging"
          fi

          echo "EFFECTIVE_CLOUD_RUN_SERVICE=${EFFECTIVE_CLOUD_RUN_SERVICE}" >> "${GITHUB_ENV}"
          echo "DEPLOY_ENVIRONMENT=${DEPLOY_ENVIRONMENT}" >> "${GITHUB_ENV}"
          echo "Deploying '${GITHUB_REF_NAME}' branch to ${DEPLOY_ENVIRONMENT} service: ${EFFECTIVE_CLOUD_RUN_SERVICE}"

      - name: Build and push image
        run: |
          IMAGE_URI="${REGION}-docker.pkg.dev/${PROJECT_ID}/${ARTIFACT_REGISTRY_REPO}/kshana-ink:${GITHUB_SHA}"
          docker build -t "${IMAGE_URI}" .
          docker push "${IMAGE_URI}"
          echo "IMAGE_URI=${IMAGE_URI}" >> "${GITHUB_ENV}"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${EFFECTIVE_CLOUD_RUN_SERVICE}" \
            --image "${IMAGE_URI}" \
            --region "${REGION}" \
            --platform managed \
            --service-account "kshana-ink@${PROJECT_ID}.iam.gserviceaccount.com" \
            --allow-unauthenticated \
            --port 8080 \
            --timeout "${REQUEST_TIMEOUT_SECONDS}" \
            --session-affinity \
            --max-instances "${MAX_INSTANCES}" \
            --no-use-http2 \
            --set-secrets "LLM_PROVIDER=LLM_PROVIDER:latest,LLM_CONTEXT_TOKENS=LLM_CONTEXT_TOKENS:latest,OPENAI_API_KEY=OPENAI_API_KEY:latest,OPENAI_BASE_URL=OPENAI_BASE_URL:latest,OPENAI_MODEL=OPENAI_MODEL:latest,COMFYUI_BASE_URL=COMFYUI_BASE_URL:latest,COMFYUI_TIMEOUT=COMFYUI_TIMEOUT:latest,POSTHOG_API_KEY=POSTHOG_API_KEY:latest,POSTHOG_HOST=POSTHOG_HOST:latest,ANALYTICS_SALT=ANALYTICS_SALT:latest"

      - name: Show service URL
        run: |
          echo "Environment: ${DEPLOY_ENVIRONMENT}"
          gcloud run services describe "${EFFECTIVE_CLOUD_RUN_SERVICE}" \
            --region "${REGION}" \
            --format="value(status.url)"
