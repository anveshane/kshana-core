services:
  kshana-ink-prod:
    image: ${PROD_IMAGE:-kshana-ink:latest}
    container_name: kshana-ink-prod
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      PORT: 8080
      NODE_ENV: production
    expose:
      - "8080"

  kshana-ink-dev:
    image: ${DEV_IMAGE:-kshana-ink:latest}
    container_name: kshana-ink-dev
    restart: unless-stopped
    env_file:
      - .env.dev
    environment:
      PORT: 8080
      NODE_ENV: production
    expose:
      - "8080"

  nginx:
    image: nginx:1.27-alpine
    container_name: kshana-ink-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "81:81"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
