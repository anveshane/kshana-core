server {
  listen 80;
  server_name _;

  client_max_body_size 50m;
  proxy_http_version 1.1;
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection "upgrade";
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_read_timeout 3600s;
  proxy_send_timeout 3600s;
  resolver 127.0.0.11 ipv6=off;

  location /dev/ {
    rewrite ^/dev/(.*)$ /$1 break;
    # Avoid relying on per-request variables for upstream selection.
    # Some Nginx builds/logs show `$dev_upstream` as uninitialized -> "invalid URL prefix".
    proxy_pass http://dhee-core-dev:8080;
  }

  location / {
    proxy_pass http://dhee-core-prod:8080;
  }
}

server {
  # Dev environment runs on a separate port so the URL can be:
  # http://<EXTERNAL_IP>:81/api/v1/health (no `/dev` prefix)
  listen 81;
  server_name _;

  client_max_body_size 50m;
  proxy_http_version 1.1;
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection "upgrade";
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_read_timeout 3600s;
  proxy_send_timeout 3600s;
  resolver 127.0.0.11 ipv6=off;

  location / {
    proxy_pass http://dhee-core-dev:8080;
  }
}
